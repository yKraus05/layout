<main class="flex flex-col min-h-screen bg-gray-800">
    <header class="mb-10 text-center md:text-left">
        <h2 class="text-3xl font-extrabold text-amber-50 mt-3 ml-6">Tecnologias Frontend</h2>
        <p class="mt-3 text-lg text-amber-50 ml-6">Conheça abaixo algumas tecnologia Frontend</p>
    </header>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
          <article *ngFor="let item of requisicao">
          <div>
                <span>{{item.tecnologia}}</span>         
          </div>
          </article>
    </div>
</main>
